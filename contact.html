<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pradeep | Contact</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="css/styles.css" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<script src="js/tailwind-config.js"></script>
</head>
<body class="bg-background-light dark:bg-background-dark text-primary dark:text-white font-body min-h-screen selection:bg-primary selection:text-background-light">
<div class="flex flex-col md:flex-row min-h-screen">
<div id="sidebar" data-active="contact"></div>
<main class="flex-1 md:ml-80 p-8 md:p-16 lg:p-24 flex flex-col">
<header class="mb-20">
<h2 class="font-heading text-3xl md:text-[48px] font-semibold uppercase tracking-[-0.02em] leading-[0.9] max-w-4xl">
                    LET'S<br/>BUILD
                </h2>
<div class="mt-8 flex items-center gap-4">
<div class="h-px w-24 bg-primary dark:bg-zinc-700"></div>
<p class="font-mono text-sm uppercase tracking-widest">Get in touch</p>
</div>
</header>
<div class="grid grid-cols-1 lg:grid-cols-2 gap-16">
<section class="flex flex-col gap-12">
<form class="flex flex-col gap-10" action="https://formspree.io/f/xreylrlp" method="POST">
<div class="relative">
<label class="block text-xs font-mono uppercase text-muted mb-2">01 / Name</label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b-2 border-primary/20 dark:border-zinc-700 focus:border-primary dark:focus:border-white focus:ring-0 px-0 py-4 text-lg placeholder:text-muted/40 dark:placeholder:text-zinc-700 transition-colors font-semibold dark:text-white" name="name" placeholder="WHO ARE YOU?" type="text"/>
</div>
<div class="relative">
<label class="block text-xs font-mono uppercase text-muted mb-2">02 / Email</label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b-2 border-primary/20 dark:border-zinc-700 focus:border-primary dark:focus:border-white focus:ring-0 px-0 py-4 text-lg placeholder:text-muted/40 dark:placeholder:text-zinc-700 transition-colors font-semibold dark:text-white" name="email" placeholder="WHERE CAN I REPLY?" type="email"/>
</div>
<div class="relative">
<label class="block text-xs font-mono uppercase text-muted mb-2">03 / Project Details</label>
<textarea class="w-full bg-transparent border-t-0 border-x-0 border-b-2 border-primary/20 dark:border-zinc-700 focus:border-primary dark:focus:border-white focus:ring-0 px-0 py-4 text-lg placeholder:text-muted/40 dark:placeholder:text-zinc-700 transition-colors font-semibold resize-none dark:text-white" name="message" placeholder="TELL ME EVERYTHING" rows="4"></textarea>
</div>
<button class="group relative flex items-center justify-between w-full py-6 px-4 bg-primary dark:bg-white text-background-light dark:text-primary hover:bg-background-light dark:hover:bg-primary hover:text-primary dark:hover:text-white border border-primary dark:border-white transition-all overflow-hidden" type="submit">
<span class="relative z-10 text-xl font-black uppercase tracking-tighter font-heading">Send Message</span>
<span class="relative z-10 material-symbols-outlined transform group-hover:translate-x-2 transition-transform">arrow_forward</span>
</button>
</form>
</section>
<section class="flex flex-col justify-between">
<div class="flex flex-col gap-12">
<div>
<h3 class="text-xs font-mono uppercase text-muted mb-6 tracking-widest border-b border-primary/10 dark:border-zinc-700 pb-2">Direct</h3>
<div class="flex flex-col gap-4">
<a class="text-xl font-mono hover:text-muted dark:hover:text-muted transition-colors flex items-center justify-between group" href="mailto:pradeep63884@gmail.com">
<span>pradeep63884@gmail.com</span>
<span class="material-symbols-outlined text-sm opacity-0 group-hover:opacity-100 transition-opacity">north_east</span>
</a>
</div>
</div>
<div>
<h3 class="text-xs font-mono uppercase text-muted mb-6 tracking-widest border-b border-primary/10 dark:border-zinc-700 pb-2">Social Platforms</h3>
<div class="flex flex-col gap-4">
<a class="text-xl font-mono hover:text-muted dark:hover:text-muted transition-colors flex items-center justify-between group" href="https://github.com/pradeep-lit">
<span>GitHub</span>
<span class="material-symbols-outlined text-sm opacity-0 group-hover:opacity-100 transition-opacity">north_east</span>
</a>
<a class="text-xl font-mono hover:text-muted dark:hover:text-muted transition-colors flex items-center justify-between group" href="https://www.linkedin.com/in/pradeep-chauhan-sixnine/">
<span>LinkedIn</span>
<span class="material-symbols-outlined text-sm opacity-0 group-hover:opacity-100 transition-opacity">north_east</span>
</a>
<a class="text-xl font-mono hover:text-muted dark:hover:text-muted transition-colors flex items-center justify-between group" href="#">
<span>Twitter / X</span>
<span class="material-symbols-outlined text-sm opacity-0 group-hover:opacity-100 transition-opacity">north_east</span>
</a>
</div>
</div>
</div>
<div class="p-8 border-2 border-primary dark:border-zinc-700 mt-12 bg-surface dark:bg-zinc-900">
<p class="text-xs font-mono uppercase text-muted mb-2">Location</p>
<p class="text-lg font-bold tracking-tight font-heading">REMOTE / MUMBAI, INDIA</p>
<p class="text-muted text-sm mt-4 font-mono">Current Time: <span id="current-time"></span> IST</p>
</div>
</section>
</div>
</main>
<div id="dark-toggle"></div>
</div>
<script src="js/components.js"></script>
<script>
function updateTime() {
    const now = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Asia/Kolkata' });
    document.getElementById('current-time').textContent = now;
}
updateTime();
setInterval(updateTime, 1000);
</script>
</body></html>
